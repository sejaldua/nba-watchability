[theme]
primaryColor = "#1D6FE3"
backgroundColor = "#FAFBFD"
secondaryBackgroundColor = "#F1F3F8"
textColor = "#0D1B2A"
linkColor = "#1D6FE3"
borderColor = "#DDE3ED"
codeBackgroundColor = "#F1F3F8"
showWidgetBorder = true
showSidebarBorder = false
baseRadius = "12px"
buttonRadius = "12px"
linkUnderline = false

font = "'DM Sans':https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap"
headingFont = "'DM Sans':https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,700;9..40,800;9..40,900&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
baseFontSize = 15
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["34px", "26px", "20px", "16px", "14px", "12px"]
headingFontWeights = [900, 800, 700, 600, 600, 500]

# Premium sports editorial palette
blueColor = "#1D6FE3"
redColor = "#C8102E"
greenColor = "#0EA47A"
orangeColor = "#E68A00"
yellowColor = "#F0A500"
violetColor = "#8B6DB0"
grayColor = "#8899AA"

chartCategoricalColors = ["#1D6FE3", "#C8102E", "#0EA47A", "#E68A00", "#8B6DB0", "#8899AA", "#4A9AF5"]

dataframeBorderColor = "#DDE3ED"
dataframeHeaderBackgroundColor = "#F1F3F8"

[server]
enableStaticServing = true
